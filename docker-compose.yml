version: '3.8'
services:
  # ==================== MySQL 数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: exam-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-exam_secret_2024}
      MYSQL_DATABASE: exam
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - exam-net

  # ==================== 后端 Spring Boot ====================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exam-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-exam_secret_2024}
      DB_NAME: exam
      EXAM_JWT_SECRET: ${EXAM_JWT_SECRET:-zh9f8a7s6df5gh4j3k2l1q0wertyuiopASDFGHJKL}
      spring.profiles.active: prod
    ports:
      - "9527:9527"
    restart: on-failure
    networks:
      - exam-net

  # ==================== 前端 Nginx ====================
  frontend:
    image: nginx:alpine
    container_name: exam-frontend
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: on-failure
    networks:
      - exam-net

volumes:
  mysql-data:

networks:
  exam-net:
    driver: bridge
