server:
  port: 9527 # 这个端口要和vue项目里vue.config.js里的devServer里面配置的相同
spring:
  profiles:
    active: dev # 默认开发环境，生产环境通过 --spring.profiles.active=prod 切换
  application:
    # P-05/P-06 修复：应用名，用于 Prometheus 指标标签和 Sleuth 链路追踪服务名
    name: spring-boot-online-exam
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:anchor120.}
    url: jdbc:mysql://${DB_HOST:192.168.88.251}:3306/${DB_NAME:exam}?characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    # P-07 修复：HikariCP 连接池参数，避免高并发下连接耗尽
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: ExamHikariPool
  jpa:
    # 调试的时候用，用于打印完成SQL语句(但是不打印参数),联合下面的logging.level一同打印最完整的SQL信息(语句+参数)
    show-sql: false
    hibernate:
      # D-04 修复：生产环境使用 validate，开发环境可通过环境变量覆盖为 update
      ddl-auto: ${EXAM_JPA_DDL_AUTO:validate}
  # 添加路径匹配策略配置，解决Springfox兼容性问题
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER
  servlet:
    multipart:
      max-file-size: 100MB # 最大支持文件大小
      max-request-size: 100MB # 最大支持请求大小

# 拦截器相关的配置
interceptors:
  # 不需要进行鉴权的接口地址，用逗号隔开
  auth-ignore-uris: /api/user/register,/api/user/login

# 考试系统自定义配置
exam:
  # JWT 密钥（生产环境务必通过环境变量覆盖）
  jwt-secret: ${EXAM_JWT_SECRET:zh9f8a7s6df5gh4j3k2l1q0wertyuiopASDFGHJKL}
  # JWT 过期时间（小时）B-11 修复：默认 2h，降低密码修改后旧 token 仍有效的风险窗口
  token-expire-hours: ${EXAM_TOKEN_EXPIRE_HOURS:2}

# P0-6 修复 [A-03]：文件上传下载根目录，下载接口仅允许访问此目录下的文件
file:
  upload-root: ${FILE_UPLOAD_ROOT:/data/exam/uploads/}

# P-05/P-06 修复：Actuator + Prometheus + Sleuth 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name:spring-boot-online-exam}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99

# P-06 修复：Spring Cloud Sleuth 链路追踪配置
spring.sleuth:
  sampler:
    # 采样率：生产环境默认 0.1（10%），可通过环境变量覆盖；调试时可设为 1.0 全采样
    probability: ${EXAM_TRACE_SAMPLER:0.1}
  # 不追踪 actuator 端点，避免监控请求污染追踪数据
  web:
    skip-pattern: "^/actuator.*"

# SQL语句打印(能打印参数，设置为trace是打印完整语句，默认我们就关掉吧)
logging:
  level:
    org.hibernate.type.descriptor.sql.BasicBinder: off
    # A-08 修复：生产环境使用 info，避免 debug 级别打印 SQL 参数泄露敏感数据
    lsgwr.exam: ${EXAM_LOG_LEVEL:info}
